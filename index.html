<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💕 عيد سعيد 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
    .birthday-message {
        margin-bottom: 20px !important;

        border-radius: 20px !important;

}

    .birthday-message {
        padding: 15px 16px !important;
        margin: 0 auto 15px auto !important;
    }
    
    .birthday-message .typing-text {
        font-size: clamp(1.1rem, 7vw, 1.9rem) !important;
    }
}

        /* 📱 MOBILE RESPONSIVE - PERFECT ON ALL SCREENS */
@media (max-width: 768px) {
    /* Password Screen */
    #passwordInput {
        width: 90vw !important;
        max-width: 280px;
        font-size: 16px;

    }

    /* Celebration */

    /* Test Button */

    /* Hearts */

/* 🌐 Landscape Mobile Fix */
@media (max-height: 500px) and (orientation: landscape) {
    #mainContent {
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 20px;
    }
    
    .birthday-message {
        font-size: 1.2em !important;
        writing-mode: vertical-rl;
        max-width: 200px;
    }
    
    .clock {
        font-size: 1.5em !important;
    }

        body {
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            position: relative;
        }

        /* Floating Hearts Background */
        .heart {
            position: absolute;
            width: 20px;
            height: 18px;
            animation: float 6s ease-in-out infinite;
        }

        .heart:before,
        .heart:after {
            content: '';
            width: 10px;
            height: 16px;
            position: absolute;
            left: 5px;
            transform: rotate(-45deg);
            background: #ff6b9d;
            border-radius: 10px 10px 0 0;
            transform-origin: 0 100%;
        }

        .heart:after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 1; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.8; }
        }

        /* Password Screen */
        #passwordScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        #passwordScreen.hidden {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        .lock-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        #passwordInput {
            width: 280px;
            padding: 15px 20px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            text-align: center;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            outline: none;
            transition: all 0.3s ease;
        }

        #passwordInput:focus {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        #errorMsg {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #errorMsg.show {
            opacity: 1;
        }

        /* Main Content */
        #mainContent {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.8s ease-out;
        }

        #mainContent.show {
            opacity: 1;
            transform: scale(1);
        }

        /* 🎉 PERFECT RESPONSIVE BIRTHDAY MESSAGE */
        .birthday-message {
            text-align: center;
            color: #fff !important;
            text-shadow: 0 0 20px rgba(255,255,255,0.8), 2px 2px 10px rgba(0,0,0,0.5);
            font-weight: bold;
            margin: 0 auto 30px auto;
            padding: 20px 25px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.4);
            opacity: 1;
            position: relative;
            z-index: 10;
            animation: glow 2s ease-in-out infinite alternate;
            box-sizing: border-box;
            max-width: 90vw;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            line-height: 1.3;
        }

        /* Typing effect container */
        .birthday-message .typing-text {
            display: block;
            font-size: clamp(1.4rem, 5vw, 2.8rem);
            overflow: hidden;
            border-right: 3px solid #ff6b9d;
            white-space: nowrap;
            animation: typing 3.5s steps(50, end), blink-caret 0.75s step-end infinite;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 20px rgba(255,107,157,0.5), 0 15px 35px rgba(0,0,0,0.2); }
            100% { box-shadow: 0 0 40px rgba(255,107,157,1), 0 20px 45px rgba(0,0,0,0.3); }
        }
        .clock {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 40px;
            font-size: 3em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .clock.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ⏰ COUNTDOWN */
        #countdown {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,107,157,0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 999;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Celebration Effects */
        .celebration {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
        }

        .celebration.show {
            display: block;
        }

        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ff6b9d;
            border-radius: 50%;
            pointer-events: none;
        }

        .happy-birthday {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            color: #ff6b9d;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            font-weight: bold;
            opacity: 0;
            animation: birthdayPop 1s ease forwards 0.5s;
            z-index: 200;
        }

        @keyframes birthdayPop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        /* 💖 HEART RAIN SYSTEM */
        #heartRainContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .heart-rain {
            position: absolute;
            animation: heartFall linear infinite;
            z-index: 51;
        }

        @keyframes heartFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .heart-rain.big { font-size: 36px; animation-duration: 10s; }
        .heart-rain.medium { font-size: 24px; animation-duration: 7s; }
        .heart-rain.small { font-size: 18px; animation-duration: 5s; }

        /* Typing Effect */
        .typing {
            overflow: hidden;
            border-right: 3px solid #ff6b9d;
            white-space: nowrap;
            animation: typing 3s steps(40, end), blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #ff6b9d; }
        }

        /* Test Button */
        #testBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            background: #ff6b9d;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        #testBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        @media (max-width: 768px) {
            .birthday-message { font-size: 1.8em !important; padding: 15px 25px !important; }
            .clock { font-size: 2em; padding: 20px 30px; }
            .happy-birthday { font-size: 2.5em; }
            #countdown { font-size: 16px; padding: 10px 20px; top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <!-- Password Screen -->
    <div id="passwordScreen">
        <div class="lock-icon">🔒</div>
        <h2 style="color: white; margin-bottom: 20px; font-size: 1.5em;">Enter Password to Unlock Surprise</h2>
        <input type="password" id="passwordInput" placeholder="💕 Your secret key 💕" maxlength="20">
        <div id="errorMsg">❌ Incorrect password!جربي " بطاطا " ا </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent">
        <div id="countdown">⏰ Loading...</div>
        <div class="birthday-message" id="birthdayMsg">
            <span >💕 كل سنه وانت طيبه وعيد سعيد وانشاء الله تعملي كل النفسك فيه يا دكتور  💕</span>
        </div>
        <div class="clock" id="clock"></div>
    </div>

    <!-- Celebration -->
    <div class="celebration" id="celebration">
        <div class="happy-birthday" id="happyBirthday">🎉 HAPPY BIRTHDAY! 🎉</div>
    </div>

    <!-- 💖 HEART RAIN -->
    <div id="heartRainContainer"></div>

    <!-- 🎵 AUDIO - REPLACE WITH YOUR LINK -->
    <audio id="celebrationAudio" preload="auto" volume="0.6" loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
        <!-- 🔄 REPLACE ABOVE URL with YOUR MP3 LINK -->
    </audio>

    <!-- 🎮 TEST BUTTON -->
    <button id="testBtn" onclick="triggerCelebration()">💥 Test Celebration</button>
    <!-- 📱 MOBILE CONTROLS -->
    <div style="position:fixed;bottom:20px;left:20px;z-index:999;display:none;" id="mobileControls">
        <button onclick="playSound()" style="background:#ff8e8e;color:white;border:none;padding:12px 20px;border-radius:25px;margin-right:10px;font-size:14px;box-shadow:0 4px 15px rgba(0,0,0,0.2);">🎵 Sound</button>
        <button onclick="createFireworks()" style="background:#ffb6c1;color:white;border:none;padding:12px 20px;border-radius:25px;font-size:14px;box-shadow:0 4px 15px rgba(0,0,0,0.2);">🎆 Fireworks</button>
    </div>

    <script>
        // Password
        const CORRECT_PASSWORD = "بطاطا";
        // Add after password unlock (around line 280):
        if (window.innerWidth <= 768) {
        document.getElementById('mobileControls').style.display = 'block';
}
        // Elements
        const passwordScreen = document.getElementById('passwordScreen');
        const passwordInput = document.getElementById('passwordInput');
        const errorMsg = document.getElementById('errorMsg');
        const mainContent = document.getElementById('mainContent');
        const clock = document.getElementById('clock');
        const celebration = document.getElementById('celebration');
        const happyBirthday = document.getElementById('happyBirthday');
        const celebrationAudio = document.getElementById('celebrationAudio');

        // Password validation
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        function checkPassword() {
            if (passwordInput.value === CORRECT_PASSWORD) {
                passwordScreen.classList.add('hidden');
                setTimeout(() => {
                    passwordScreen.style.display = 'none';
                    mainContent.classList.add('show');
                    clock.classList.add('show');
                    startClock();
                    startHeartRain();
                    createFloatingHearts();
                    
                    // 🎵 START MUSIC AFTER INTERACTION
                    celebrationAudio.play().catch(e => console.log('Music ready!'));
                }, 800);
            } else {
                errorMsg.classList.add('show');
                passwordInput.value = '';
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
            }
        }

        // Live Clock
        function startClock() {
            function updateClock() {
                const now = new Date();
                const timeString = now.toLocaleTimeString('en-US', {
                    hour12: false,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                clock.textContent = timeString;
            }
            updateClock();
            setInterval(updateClock, 1000);
        }

        // ⏰ COUNTDOWN TO MIDNIGHT
        function updateCountdown() {
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(0, 0, 0, 0);
            
            const diff = tomorrow - now;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            const countdownEl = document.getElementById('countdown');
            if (countdownEl) {
                countdownEl.textContent = `⏰ ${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')} to MIDNIGHT 💥`;
                
                // FLASH WARNING < 10 seconds
                if (seconds < 10) {
                    countdownEl.style.background = '#ff4444';
                    countdownEl.style.transform = 'scale(1.2)';
                } else {
                    countdownEl.style.background = 'rgba(255,107,157,0.9)';
                    countdownEl.style.transform = 'scale(1)';
                }
            }
        }

        // Check for midnight
        function checkMidnight() {
            const now = new Date();
            if (now.getHours() === 0 && now.getMinutes() === 0 && now.getSeconds() === 0) {
                triggerCelebration();
            }
        }

        // 🔊 SOUND FUNCTION
        function playSound() {
            celebrationAudio.currentTime = 0;
            celebrationAudio.volume = 0.6;
            celebrationAudio.play().catch(e => console.log('Audio playing!'));
        }

        // Celebration
        function triggerCelebration() {
            celebration.classList.add('show');
            playSound();
            createFireworks();
            createExtraHearts();
            console.log('🎉 MIDNIGHT CELEBRATION TRIGGERED!');
        }

        // 💖 CONTINUOUS HEART RAIN
        function startHeartRain() {
            setInterval(() => {
                const container = document.getElementById('heartRainContainer');
                const heart = document.createElement('div');
                heart.className = 'heart-rain';
                
                const emojis = ['💖', '💕', '💗', '💝', '🌹', '✨', '💫', '🎀'];
                heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
                
                const sizes = ['small', 'medium', 'big'];
                heart.classList.add(sizes[Math.floor(Math.random() * 3)]);
                
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 12000);
            }, 150);
        }

        // Floating Hearts Background
        function createFloatingHearts() {
            setInterval(() => {
                if (!celebration.classList.contains('show')) {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                    heart.style.opacity = Math.random() * 0.5 + 0.3;
                    heart.style.fontSize = (Math.random() * 10 + 10) + 'px';
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 6000);
                }
            }, 300);
        }

        //        // 🎆 EPIC FIREWORKS (500 explosions!)
        function createFireworks() {
            for (let i = 0; i < 500; i++) {
                setTimeout(() => createEpicFirework(), i * 30);
            }
        }

        function createEpicFirework() {
            const firework = document.createElement('div');
            firework.className = 'firework';
            firework.style.left = Math.random() * 100 + '%';
            firework.style.top = Math.random() * 100 + '%';
            
            const size = Math.random() * 20 + 10;
            const colors = ['#ff6b9d', '#ff8e8e', '#ffcccb', '#ffd1dc', '#ffb6c1', '#ff69b4', '#ff1493'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            firework.style.width = size + 'px';
            firework.style.height = size + 'px';
            firework.style.background = color;
            firework.style.boxShadow = `0 0 ${size*2}px ${color}, inset 0 0 ${size}px rgba(255,255,255,0.5)`;
            
            document.body.appendChild(firework);
            
            anime({
                targets: firework,
                scale: [0, 4, 0],
                opacity: [1, 0.8, 0],
                translateX: () => (Math.random() - 0.5) * 800,
                translateY: () => (Math.random() - 0.5) * 800,
                rotate: '1080deg',
                duration: 3000,
                easing: 'easeOutExpo',
                complete: () => firework.remove()
            });
        }

        // 💥 EXTRA HEARTS (100 massive hearts)
        function createExtraHearts() {
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.top = '100%';
                    heart.style.fontSize = '40px';
                    heart.style.animationDuration = '3s';
                    heart.innerHTML = '💖';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 3000);
                }, i * 30);
            }
        }

        // Simple anime.js-like animation
        function anime(options) {
            const element = options.targets;
            const startTime = performance.now();
            const duration = options.duration || 1000;
            
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = options.easing === 'easeOutExpo' ? 
                    1 - Math.pow(1 - progress, 3) : progress;
                
                if (options.scale) {
                    const scale = options.scale[0] + (options.scale[1] - options.scale[0]) * easeProgress;
                    element.style.transform = `scale(${scale})`;
                }
                if (options.opacity !== undefined && options.opacity.length >= 3) {
                    element.style.opacity = options.opacity[2] * easeProgress + 
                        (options.opacity[1] * (1 - easeProgress));
                }
                if (options.translateX) {
                    element.style.transform += ` translateX(${options.translateX()}px)`;
                }
                if (options.translateY) {
                    element.style.transform += ` translateY(${options.translateY()}px)`;
                }
                if (options.rotate) {
                    element.style.transform += ` rotate(${options.rotate})`;
                }
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else if (options.complete) {
                    options.complete();
                }
            }
            requestAnimationFrame(animate);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            passwordInput.focus();
            const midnightInterval = setInterval(checkMidnight, 1000);
            setInterval(updateCountdown, 1000);
            updateCountdown();
        });
    </script>
</body>
